<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雨夌站 | 关于</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Han+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main-styles.css">
    <meta name="theme-color" content="var(--md3-primary)">
</head>
<body>
    <!-- 语义化头部区域 -->
    <header id="navbar" role="banner"></header>

    <!-- 主要内容区域 -->
    <main class="main-content" role="main">
        <div class="page-header" style="margin: var(--md3-spacing-8) 0 var(--md3-spacing-6); text-align: center;">
            <h1 class="headline-large" style="color: var(--md3-on-surface);">关于雨夌站</h1>
        </div>

        <section class="card" role="article">
            <h2 class="headline-medium" style="color: var(--md3-on-surface); margin-bottom: var(--md3-spacing-3);">网站介绍</h2>
            <div class="content-section">
                <p class="body-large" style="color: var(--md3-on-surface); margin-bottom: var(--md3-spacing-2);">雨夌站是一个致力于提供优质内容和便捷导航的个人网站。我们专注于为用户提供最新的资讯、实用的工具和丰富的资源 (目前还没有)</p>
                <p class="body-large" style="color: var(--md3-on-surface);">此网站仅用作技术学习使用</p>
                <div class="button-group" style="margin-top: var(--md3-spacing-4);">
                    <a href="/update/" class="button secondary" aria-label="查看更新日志">查看更新日志</a>
                </div>
            </div>
        </section>

        <section class="card" role="article">
            <h2 class="headline-medium" style="color: var(--md3-on-surface); margin-bottom: var(--md3-spacing-3);">我们的“团队”</h2>
            <div class="team-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: var(--md3-spacing-4); margin-top: var(--md3-spacing-4);">
                <div class="team-card" style="background-color: var(--md3-surface-container); padding: var(--md3-spacing-5); border-radius: var(--md3-radius-large); box-shadow: var(--md3-elevation-1);">
                    <h3 class="title-medium" style="color: var(--md3-on-surface); margin-bottom: var(--md3-spacing-2);">UI设计</h3>
                    <p class="body-medium" style="color: var(--md3-on-surface-variant); margin-bottom: var(--md3-spacing-1);">DeepSeek V3（深度求索）</p>
                    <p class="body-medium" style="color: var(--md3-on-surface-variant);">Kimi AI（Moonshot）</p>
                </div>

                <div class="team-card">
                    <h3 class="title-medium" style="color: var(--md3-on-surface); margin-bottom: var(--md3-spacing-2);">前端</h3>
                    <p class="body-medium" style="color: var(--md3-on-surface-variant); margin-bottom: var(--md3-spacing-1);">DeepSeek V3（深度求索）</p>
                    <p class="body-medium" style="color: var(--md3-on-surface-variant);">雨夌</p>
                </div>

                <div class="team-card">
                    <h3 class="title-medium" style="color: var(--md3-on-surface); margin-bottom: var(--md3-spacing-2);">后端</h3>
                    <p class="body-medium" style="color: var(--md3-on-surface-variant); margin-bottom: var(--md3-spacing-1);">Github Pages</p>
                    <p class="body-medium" style="color: var(--md3-on-surface-variant);">雨夌</p>
                </div>
            </div>
        </section>
    </main>

    <!-- 语义化页脚区域 -->
    <footer id="footer" role="contentinfo"></footer>

    <!-- JavaScript 加载 -->
    <script src="/js/navbar.js" defer></script>
    <script src="/js/footer.js" defer></script>
</body>
</html>
