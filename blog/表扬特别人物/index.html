<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表扬特别人物 | 雨夌站</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Han+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main-styles.css">
    <meta name="theme-color" content="var(--md3-primary)">
    <style>
        .article-header {
            margin-bottom: var(--md3-spacing-8);
            padding-bottom: var(--md3-spacing-4);
            border-bottom: 1px solid var(--md3-outline-variant);
        }
        .article-meta {
            color: var(--md3-on-surface-variant);
            font-size: var(--md3-body-small-size);
            margin-bottom: var(--md3-spacing-4);
        }
        .article-content {
            line-height: var(--md3-line-height-body);
        }
        .article-content h3 {
            margin: var(--md3-spacing-8) 0 var(--md3-spacing-4) 0;
            color: var(--md3-primary);
            font-size: var(--md3-headline-small-size);
            font-weight: var(--md3-headline-small-weight);
        }
        .article-content p {
            margin-bottom: var(--md3-spacing-6);
            font-size: var(--md3-body-large-size);
            line-height: var(--md3-body-large-line-height);
        }
        .article-image {
            margin: var(--md3-spacing-6) 0;
            border-radius: var(--md3-radius-large);
            overflow: hidden;
            box-shadow: var(--md3-elevation-2);
        }
        .article-image img {
            width: 100%;
            height: auto;
            display: block;
        }
        .article-footer {
            margin-top: var(--md3-spacing-8);
            padding-top: var(--md3-spacing-4);
            border-top: 1px solid var(--md3-outline);
        }
    </style>
</head>
<body>
    <!-- 语义化头部区域 -->
    <header id="navbar" role="banner"></header>

    <!-- 主要内容区域 -->
    <main class="main-content" role="main">
        <article class="card" role="article">
            <header class="article-header">
                <h1 class="headline-large" style="color: var(--md3-on-surface); margin-bottom: var(--md3-spacing-2);">表扬特别人物</h1>
                <div class="article-meta">
                    <time datetime="2025-03-08">2025年3月8日 17:45</time> | <b>雨夌 发表</b> | id: 3
                </div>
            </header>

            <div class="article-content">
                <p>表扬一下高一四班徐冰.同学</p>
                
                <div class="article-image">
                    <img src="/blog/表扬特别人物/1.png" alt="3.1.聊天记录" aria-describedby="image-caption">
                </div>
                <p id="image-caption" class="article-meta">3.1.聊天记录</p>
            </div>

            <footer class="article-footer">
                <a href="/blog/" class="md3-button md3-button--secondary" aria-label="完成阅读">完成阅读</a>
            </footer>
        </article>
    </main>

    <!-- 语义化页脚区域 -->
    <footer id="footer" role="contentinfo"></footer>

    <!-- JavaScript 加载 -->
    <script src="/js/navbar.js" defer></script>
    <script src="/js/footer.js" defer></script>
</body>
</html>
