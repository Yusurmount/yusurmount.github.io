<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晾一下猪肉 | 雨夌站</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Han+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main-styles.css">
    <meta name="theme-color" content="var(--md3-primary)">
    <style>
        .article-header {
            margin-bottom: var(--md3-spacing-8);
            padding-bottom: var(--md3-spacing-4);
            border-bottom: 1px solid var(--md3-outline-variant);
        }
        .article-meta {
            color: var(--md3-on-surface-variant);
            font-size: var(--md3-body-small-size);
            margin-bottom: var(--md3-spacing-4);
            display: flex;
            align-items: center;
            gap: var(--md3-spacing-2);
        }
        .article-content {
            line-height: var(--md3-line-height-body);
        }
        .article-content h3 {
            margin: var(--md3-spacing-8) 0 var(--md3-spacing-4) 0;
            color: var(--md3-primary);
            font-size: var(--md3-headline-small-size);
            font-weight: var(--md3-headline-small-weight);
        }
        .article-content p {
            margin-bottom: var(--md3-spacing-6);
            font-size: var(--md3-body-large-size);
            line-height: var(--md3-body-large-line-height);
        }
        .article-footer {
            margin-top: var(--md3-spacing-8);
            padding-top: var(--md3-spacing-4);
            border-top: 1px solid var(--md3-outline);
        }
    </style>
</head>
<body>
    <!-- 语义化头部区域 -->
    <header id="navbar" role="banner"></header>

    <!-- 主要内容区域 -->
    <main class="main-content" role="main">
        <article class="card" role="article">
            <header class="article-header">
                <h1 class="headline-large" style="color: var(--md3-on-surface); margin-bottom: var(--md3-spacing-2);">晾一下猪肉</h1>
                <div class="article-meta">
                    <time datetime="2024-05-20">2024-05-20</time>
                </div>
            </header>

            <div class="article-content">
                <p>晾猪肉是一种传统的肉类处理方法，通过自然风干可以提升肉质口感，增加风味。</p>
                
                <h3>步骤一：选择合适的猪肉</h3>
                <p>最好选择五花肉或后腿肉，肥瘦相间的猪肉晾晒后口感更佳。</p>
                
                <h3>步骤二：腌制</h3>
                <p>用盐、花椒、八角等调料腌制猪肉，放入冰箱冷藏24小时。</p>
                
                <h3>步骤三：晾晒</h3>
                <p>将腌制好的猪肉挂在通风阴凉处，避免阳光直射，晾晒3-5天即可。</p>
            </div>

            <footer class="article-footer">
                <a href="/blog/" class="md3-button md3-button--secondary" aria-label="返回博客列表">返回博客列表</a>
            </footer>
        </article>
    </main>

    <!-- 语义化页脚区域 -->
    <footer id="footer" role="contentinfo"></footer>

    <!-- JavaScript 加载 -->
    <script src="/js/navbar.js" defer></script>
    <script src="/js/footer.js" defer></script>
</body>
</html>
