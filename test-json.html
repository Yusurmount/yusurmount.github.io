<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Test</title>
</head>
<body>
    <h1>JSON Loading Test</h1>
    <div id="result"></div>
    
    <script>
        async function testJsonLoading() {
            const resultDiv = document.getElementById('result');
            
            try {
                resultDiv.innerHTML = '<p>Loading JSON...</p>';
                
                const response = await fetch('/context/docs/index.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const text = await response.text();
                resultDiv.innerHTML += `<p>JSON text: ${text}</p>`;
                
                const docs = JSON.parse(text);
                resultDiv.innerHTML += `<p>Parsed docs: ${JSON.stringify(docs)}</p>`;
                resultDiv.innerHTML += `<p>Number of docs: ${docs.length}</p>`;
                
                docs.forEach((doc, index) => {
                    resultDiv.innerHTML += `<p>Doc ${index + 1}: ${doc.title}</p>`;
                });
                
                resultDiv.innerHTML += '<p style="color: green;">✓ JSON loading successful!</p>';
            } catch (error) {
                resultDiv.innerHTML += `<p style="color: red;">✗ Error: ${error.message}</p>`;
                console.error('Error:', error);
            }
        }
        
        testJsonLoading();
    </script>
</body>
</html>
