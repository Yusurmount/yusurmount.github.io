<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人网页</title>
    <!-- 引入Material Design 3 -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@material/web@1.0.0-beta.3/dist/md3.js"></script>
    <!-- 引入自定义主题CSS -->
    <link rel="stylesheet" href="/css/md3-theme.css">
</head>
<body>
    <div id="header-container"></div>
    <div id="menu-container"></div>
    <main id="content-container"></main>
    <div id="footer-container"></div>

    <!-- 引入路由脚本 -->
    <script src="/js/router.js"></script>
    <script>
        // 动态加载组件
        document.addEventListener('DOMContentLoaded', function() {
            // 加载header
            fetch('/components/header.html')
                .then(response => response.text())
                .then(html => document.getElementById('header-container').innerHTML = html);
            
            // 加载footer
            fetch('/components/footer.html')
                .then(response => response.text())
                .then(html => document.getElementById('footer-container').innerHTML = html);
            
            // 加载menu
            fetch('/components/menu.html')
                .then(response => response.text())
                .then(html => document.getElementById('menu-container').innerHTML = html);
        });
    </script>
</body>
</html>
