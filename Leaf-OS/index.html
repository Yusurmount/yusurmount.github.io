<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaf OS - 简而轻的PPT系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Han+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main-styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .hero-section {
            text-align: center;
            padding: 40px 20px;
        }
    
        .hero-logo {
            width: 114.25px;
            height: 137.5px;
            margin: 0 auto 20px;
        }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .feature-card {
            background-color: #2C2C2C;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }
        .feature-card:hover {
            transform: translateY(-5px);
        }
        .feature-icon {
            font-size: 32px;
            margin-bottom: 15px;
            color: #2196F3;
        }
    </style>
</head>
<body>
    <div id="navbar"></div>

    <div class="main-content">
        <div class="hero-section">
            <img src="img/Leaf.svg" alt="Leaf OS Logo" class="hero-logo">
            <h1>Leaf OS</h1>
            <p class="tagline">简约、扁平、现代化的PPT系统</p>
            <div style="margin-top: 30px;">
                <a href="#download" class="button primary">立即下载</a>
                <a href="https://github.com/Yusurmount/Leaf-OS/" class="button secondary">前往仓库</a>
            </div>
        </div>

        <div id="features" class="features-grid">
            <div class="feature-card">
                <div class="feature-icon">⚡</div>
                <h3>轻量高效</h3>
                <p>极致优化的系统内核，启动速度快，资源占用低，让老旧设备焕发新生</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🎨</div>
                <h3>现代界面</h3>
                <p>扁平化设计语言，简洁直观的用户界面，专注内容而非装饰</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🔄</div>
                <h3>持续更新</h3>
                <p>定期系统更新，不断优化体验</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🔌</div>
                <h3>强兼容性</h3>
                <p>广泛支持各类硬件设备，减少配置烦恼</p>
            </div>
        </div>

        <div id="download" class="card" style="text-align: center; margin-top: 40px; padding: 30px;">
            <h2>开始使用 Leaf OS</h2>
            <p>下载最新版本，体验简约现代的操作系统</p>
            <div style="margin-top: 20px;">
                <a href="/Leaf-OS/download/" class="button primary" style="padding: 12px 30px; font-size: 16px;">下载 Leaf OS 5 预览版本</a>
            </div>
            <p style="margin-top: 15px; color: #B0B0B0;">支持安装了PowerPoint 2019及以上版本的 Windows, macOS, Linux 平台</p>
        </div>

        <div id="readme-section" class="card" style="margin-top: 40px; padding: 30px;">
            <h2>项目文档</h2>
            <div id="readme-content"></div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="/js/navbar.js"></script>
    <script src="/js/footer.js"></script>
    <script>
        // 加载并显示README.md内容
        fetch('https://github.com/Yusurmount/Leaf-OS/blob/5b7294f384187b0d7e9441981141152507074ae0/README.md')
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.text();
            })
            .then(markdown => {
                document.getElementById('readme-content').innerHTML = marked.parse(markdown);
            })
            .catch(error => {
                console.error('加载README失败:', error);
                document.getElementById('readme-content').innerHTML = '<p>无法加载项目文档，请检查网络连接或稍后再试。</p>';
            });
    </script>
</body>
</html>
