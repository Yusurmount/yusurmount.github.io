<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQ联系 | 雨夌站</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Han+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main-styles.css">
    <meta name="theme-color" content="var(--md3-primary)">
    <style>
        .contact-header {
            margin-bottom: var(--md3-spacing-6);
        }
        .contact-card {
            margin-bottom: var(--md3-spacing-4);
        }
        .contact-info {
            margin-bottom: var(--md3-spacing-3);
        }
        .contact-actions {
            display: flex;
            gap: var(--md3-spacing-3);
            margin-top: var(--md3-spacing-4);
        }
        .qq-number {
            font-family: var(--md3-code-font);
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <!-- 语义化头部区域 -->
    <header id="navbar" role="banner"></header>

    <!-- 主要内容区域 -->
    <main class="main-content" role="main">
        <div class="contact-header">
            <h1>使用QQ联系</h1>
        </div>

        <section class="card contact-card" role="region" aria-label="QQ联系方式">
            <div class="contact-info">
                <p>QQ号：<span class="qq-number">1722489885</span></p>
            </div>
            <div class="contact-actions">
                <a href="/contact/qq/QR" class="button primary" aria-label="查看QQ二维码">通过扫二维码添加</a>
                <a href="/contact/" class="button secondary" aria-label="返回联系页面">返回联系页面</a>
            </div>
        </section>
    </main>

    <!-- 语义化页脚区域 -->
    <footer id="footer" role="contentinfo"></footer>

    <!-- JavaScript 加载 -->
    <script src="/js/navbar.js" defer></script>
    <script src="/js/footer.js" defer></script>
</body>
</html>
