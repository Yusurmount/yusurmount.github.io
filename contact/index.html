<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雨夌站 | 联系</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Han+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main-styles.css">
    <meta name="theme-color" content="var(--md3-primary)">
    <style>
        .contact-header {
            margin-bottom: var(--md3-spacing-6);
        }
        .contact-intro {
            margin-bottom: var(--md3-spacing-5);
        }
        .contact-methods {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--md3-spacing-4);
        }
        .contact-card {
            transition: var(--md3-transition-standard);
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .contact-card:hover {
            box-shadow: var(--md3-elevation-4);
            transform: translateY(-2px);
        }
        .contact-info {
            margin-bottom: var(--md3-spacing-3);
            flex-grow: 1;
        }
        .contact-action {
            margin-top: auto;
        }
    </style>
</head>
<body>
    <!-- 动态加载标题栏 -->
    <header id="navbar" role="banner"></header>

    <main class="main-content" role="main">
        <div class="contact-header">
            <h1>联系我们</h1>
        </div>

        <section class="card contact-intro" role="region" aria-label="联系介绍">
            <p>您可以通过以下方式联系我们，我们会尽快回复您的消息。</p>
        </section>

        <div class="contact-methods">
            <article class="card contact-card" role="article" aria-label="抖音联系方式">
                <h2>抖音</h2>
                <div class="contact-info">
                    <p>搜索用户：雨夌</p>
                </div>
                <div class="contact-action">
                    <a href="/contact/douyin/" class="button secondary" aria-label="查看抖音详细信息">查看详细</a>
                </div>
            </article>

            <article class="card contact-card" role="article" aria-label="邮箱联系方式">
                <h2>邮箱</h2>
                <div class="contact-info">
                    <p>yusur@example.com</p>
                </div>
                <div class="contact-action">
                    <a href="/contact/email/" class="button secondary" aria-label="发送邮件">发送邮件</a>
                </div>
            </article>

            <article class="card contact-card" role="article" aria-label="QQ联系方式">
                <h2>QQ</h2>
                <div class="contact-info">
                    <p>123456789</p>
                </div>
                <div class="contact-action">
                    <a href="/contact/qq/" class="button secondary" aria-label="添加QQ好友">添加好友</a>
                </div>
            </article>
        </div>
    </main>

    <!-- 动态加载页脚 -->
    <footer id="footer" role="contentinfo"></footer>

    <!-- 引入外部 JavaScript 文件 -->
    <script src="/js/navbar.js" defer></script>
    <script src="/js/footer.js" defer></script>
</body>
</html>
